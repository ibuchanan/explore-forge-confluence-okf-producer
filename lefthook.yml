pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: |
        command -v gitleaks >/dev/null 2>&1 || {
          echo "gitleaks not found on PATH. Install it with: brew install gitleaks" >&2
          exit 1
        }
        gitleaks git --pre-commit --staged
    lint:
      glob: "*.{ts,tsx}"
      run: npm run lint:check
    format:
      glob: "*.{ts,tsx,json,yml,yaml,md}"
      run: npm run format:check
    typecheck:
      glob: "*.{ts,tsx}"
      run: npm run typecheck

lint:
  parallel: true
  commands:
    prelint:
      run: npm run lint:prelint
    biome:
      run: npm run lint:check
    forge:
      run: npm run lint:forge

pre-push:
  parallel: true
  commands:
    lint:
      run: npm run lint
    typecheck:
      run: npm run typecheck
    format:
      run: npm run format:check
    test:
      run: npm run test
    size:
      run: npm run size:check
